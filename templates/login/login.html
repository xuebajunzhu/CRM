{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>登录 - CRM 管理系统</title>
    <link rel="stylesheet" href="{% static "login/css/style.css" %}">
    <link rel="stylesheet" href="{% static 'app01/css/main.css' %}">
    <style>
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 90%;
        }
        
        .login-container h1 {
            color: #4e73df;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        
        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            border: 1px solid #d1d3e2;
            border-radius: 0.35rem;
            font-size: 1rem;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }
        
        .login-container input:focus {
            border-color: #4e73df;
            outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
        }
        
        .login-container button[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            color: white;
            border: none;
            border-radius: 0.35rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }
        
        .login-container button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .register-tis {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
            background: transparent;
            border: 2px solid #4e73df;
            color: #4e73df;
            border-radius: 0.35rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .register-tis:hover {
            background: #4e73df;
            color: white;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 0.75rem;
            border-radius: 0.35rem;
            margin: 1rem 0;
            border: 1px solid #f5c6cb;
            animation: slideInDown 0.3s ease-out;
        }
        
        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .spinner {
            width: 3rem;
            height: 3rem;
            border: 0.25rem solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #4e73df;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="login-container fade-in">
    <h1>🔐 用户登录</h1>
    <div class="connect">
        <p style="left: 0%; text-align: center; color: #666;">欢迎使用 CRM 管理系统</p>
    </div>
    
    {% if error_msg %}
    <div class="error-message">
        {{ error_msg }}
    </div>
    {% endif %}
    
    <form action="" method="post" id="loginForm" class="needs-validation" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <input type="text" 
                   name="username" 
                   class="form-control username" 
                   placeholder="请输入用户名" 
                   autocomplete="off" 
                   value="{{ form.username.value|default:'' }}"
                   required
                   minlength="3">
            <div class="invalid-feedback">用户名至少 3 个字符</div>
        </div>
        <div class="form-group">
            <input type="password" 
                   name="password" 
                   class="form-control password" 
                   placeholder="请输入密码"
                   required
                   minlength="6">
            <div class="invalid-feedback">密码至少 6 个字符</div>
        </div>
        <button id="submit" type="submit">
            <span class="btn-text">登 录</span>
        </button>
    </form>
    <a href="{% url "app01:register" %}" style="text-decoration: none;">
        <button type="button" class="register-tis">还没有账号？立即注册</button>
    </a>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content" style="text-align: center;">
        <div class="spinner"></div>
        <div class="loading-text" style="margin-top: 1rem; color: #4e73df; font-weight: 600;">正在登录...</div>
    </div>
</div>

<script src="{% static "login/js/jquery.min(1).js" %}"></script>
<script src="{% static "login/js/jquery.validate.min.js" %}"></script>
<script src="{% static "login/js/common.js" %}"></script>
<script src="{% static "login/js/supersized.3.2.7.min.js" %}"></script>
<script src="{% static "login/js/supersized-init.js" %}"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('loginForm');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    const inputs = form.querySelectorAll('input');
    inputs.forEach(function(input) {
        input.addEventListener('blur', function() {
            validateField(input);
        });
        
        input.addEventListener('input', function() {
            if (input.classList.contains('is-invalid')) {
                input.classList.remove('is-invalid');
                const feedback = input.parentNode.querySelector('.invalid-feedback');
                if (feedback) feedback.style.display = 'none';
            }
        });
    });
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        let isValid = true;
        inputs.forEach(function(input) {
            if (!validateField(input)) {
                isValid = false;
            }
        });
        
        if (isValid) {
            loadingOverlay.classList.add('active');
            setTimeout(function() {
                form.submit();
            }, 500);
        } else {
            const firstInvalid = form.querySelector('.is-invalid');
            if (firstInvalid) {
                firstInvalid.scrollIntoView({ behavior: 'smooth', block: 'center' });
                firstInvalid.focus();
            }
        }
    });
});

function validateField(field) {
    let isValid = true;
    const value = field.value.trim();
    const required = field.hasAttribute('required');
    const minLength = field.getAttribute('minlength');
    
    field.classList.remove('is-valid', 'is-invalid');
    
    if (required && !value) {
        isValid = false;
        showFieldError(field, '此字段为必填项');
        return isValid;
    }
    
    if (value && minLength && value.length < parseInt(minLength)) {
        isValid = false;
        showFieldError(field, '最少需要' + minLength + '个字符');
        return isValid;
    }
    
    if (isValid && value) {
        field.classList.add('is-valid');
    }
    
    return isValid;
}

function showFieldError(field, message) {
    field.classList.add('is-invalid');
    let feedback = field.parentNode.querySelector('.invalid-feedback');
    
    if (!feedback) {
        feedback = document.createElement('div');
        feedback.className = 'invalid-feedback';
        field.parentNode.appendChild(feedback);
    }
    
    feedback.textContent = message;
    feedback.style.display = 'block';
}
</script>

<ul id="supersized" class="speed" style="visibility: visible;">
    <li class="slide-0 prevslide" style="visibility: visible; opacity: 1;"><a target="_blank"><img
            src="{% static "login/imag/1.jpg" %}" style="width: 1134.92px; left: -66px; top: 0px; height: 715px;"></a></li>
    <li class="slide-1 activeslide" style="visibility: visible; opacity: 0.152044;"><a target="_blank"><img
            src="{% static "login/imag/2.jpg" %}" style="width: 1021.43px; left: -9px; top: 0px; height: 715px;"></a></li>
    <li class="slide-2" style="visibility: visible; opacity: 1;"><a target="_blank"><img
            src="{% static "login/imag/3.jpg" %}" style="height: 715px; width: 1134.92px; left: -66px; top: 0px;"></a></li>
</ul>
</body>
</html>
